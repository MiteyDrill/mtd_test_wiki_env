name: Deploy HTML Wiki to GitHub Pages

on:
  push:
    branches:
      - main # Adjust to 'master' if needed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble Static Site Folder
        run: |
          # 1. Create a clean build destination directory
          mkdir -p public_site
          
          # 2. Copy your custom HTML folder paths into it
          cp -r characters public_site/ 2>/dev/null || true
          cp -r character_portraits public_site/ 2>/dev/null || true
          
          # 3. Only grab your images/svgs from assets (ignoring the software's node css/js)
          mkdir -p public_site/assets
          cp -r assets/img public_site/assets/ 2>/dev/null || true
          cp -r assets/svg public_site/assets/ 2>/dev/null || true
          
          # 4. CRITICAL: Convert home.html to index.html so it serves as your main URL landing page
          if [ -f "home.html" ]; then
            cp home.html public_site/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_site
